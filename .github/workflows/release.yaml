name: Release

on:
  push:
    branches:
      - release
      - release-*

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - run: pnpm ci
      - run: pnpm dlx @firefoxic/release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
