name: Release

on:
  push:
    branches:
      - release
      - release-*

permissions:
  contents: write
  id-token: write

env:
  FORCE_COLOR: 2

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - run: make setup
      - run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
