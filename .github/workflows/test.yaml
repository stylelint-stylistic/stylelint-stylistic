name: Test

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - '*'

env:
  FORCE_COLOR: 2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          cache: true
          version: latest
      - run: make setup
      - run: make check
      - run: make lint
      - run: make test FLAGS="--reporter=github-actions --reporter=default"
